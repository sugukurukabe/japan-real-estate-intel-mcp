name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm lint

      - name: ESLint
        run: pnpm lint:eslint

      - name: Security audit
        run: pnpm audit --prod --audit-level=critical

      - name: Build server
        run: pnpm build:server

      - name: Build UI
        run: pnpm build:ui

      - name: Test with coverage
        run: pnpm test:coverage
        env:
          LOG_LEVEL: silent

      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

      - name: Coverage summary
        if: matrix.node-version == 22
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              Object.entries(s).forEach(([k,v]) => console.log(\`| \${k} | \${v.pct}% |\`));
            " >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage-summary.json found" >> $GITHUB_STEP_SUMMARY
          fi

  # Builds the actual production Dockerfile and exercises the SQLite-backed
  # code paths (usage quota, license storage, artifacts) inside the real
  # container as a non-root user. This is the only check that would have
  # caught the v8.0.0 bug where --ignore-scripts silently broke
  # better-sqlite3's native binding and a root-owned named volume caused
  # SQLITE_CANTOPEN — both invisible to `pnpm test` (which never builds this
  # Dockerfile) and to /health (which returns 200 either way). See
  # docs/deploy.md "デプロイ後の動作確認" and the v8.0.0 CHANGELOG entry.
  docker-sqlite-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build production image
        run: docker build -t japan-re-intel-mcp:ci .

      - name: Run container as a non-root user with a real named volume
        run: |
          docker volume create rei_sqlite_ci
          docker run -d --name rei-mcp-ci \
            -v rei_sqlite_ci:/app/db \
            -e METRICS_KEY=ci-smoke-key \
            japan-re-intel-mcp:ci
          for i in $(seq 1 20); do
            docker exec rei-mcp-ci wget -qO- http://127.0.0.1:3100/health && break
            sleep 1
          done

      - name: Exercise usage-store / license-store / artifacts SQLite paths
        run: |
          docker exec rei-mcp-ci node -e "
            const { saveArtifact, getArtifact } = require('./dist/artifacts.js');
            const { incrementClientUsage, getClientUsage } = require('./dist/usage-store.js');
            const { getLicenseBySessionId } = require('./dist/billing/license-store.js');

            const meta = saveArtifact('ci smoke test', 'smoke.txt', 'text/plain');
            const found = getArtifact(meta.id);
            if (!found || found.data.toString('utf-8') !== 'ci smoke test') {
              throw new Error('artifacts.ts round-trip failed inside container: ' + JSON.stringify(found));
            }

            incrementClientUsage('ci-smoke-client', '2099-01');
            if (getClientUsage('ci-smoke-client', '2099-01') !== 1) {
              throw new Error('usage-store.ts round-trip failed inside container');
            }

            getLicenseBySessionId('nonexistent'); // must not throw

            console.log('SQLite smoke test OK: artifacts + usage-store + license-store all opened/wrote/read successfully as the non-root container user.');
          "

      - name: Confirm /app/db is writable by the non-root rei user (not root-owned)
        run: |
          OWNER=$(docker exec rei-mcp-ci stat -c '%U:%G' /app/db)
          echo "Owner: $OWNER"
          if [ "$OWNER" != "rei:rei" ]; then
            echo "::error::/app/db is owned by $OWNER, expected rei:rei — SQLite opens will fail as SQLITE_CANTOPEN for the non-root container user."
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker logs rei-mcp-ci || true
          docker rm -f rei-mcp-ci || true
          docker volume rm rei_sqlite_ci || true
