# Publish server.json to the MCP Registry on release or manual dispatch.
# Requires repository secret: MCP_REGISTRY_TOKEN
# Generate: mcp-publisher login github (then export token per Registry docs)
# See docs/registry-ci.md

name: MCP Registry Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'sugukurukabe/japan-real-estate-intel-mcp'
    steps:
      - uses: actions/checkout@v7

      - name: Install mcp-publisher
        run: |
          ARCH=amd64
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_${ARCH}.tar.gz" \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --help

      - name: Validate server.json version matches tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(node -p "require('./server.json').version")
          test "$TAG" = "$VER" || { echo "Tag v$TAG != server.json version $VER"; exit 1; }

      - name: Publish to MCP Registry
        id: registry_publish
        env:
          MCP_REGISTRY_TOKEN: ${{ secrets.MCP_REGISTRY_TOKEN }}
        run: |
          if [ -z "$MCP_REGISTRY_TOKEN" ]; then
            echo "::warning::MCP_REGISTRY_TOKEN not set — skip publish. See docs/registry-ci.md"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export MCP_REGISTRY_TOKEN
          mcp-publisher publish --file server.json
          echo "status=published" >> "$GITHUB_OUTPUT"

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## MCP Registry publish summary"
            echo
            if [ "${{ steps.registry_publish.outputs.status }}" = "published" ]; then
              echo "✅ Published \`server.json\` to the MCP Registry."
            else
              echo "⚠️ **Skipped** — \`MCP_REGISTRY_TOKEN\` secret not set. See [docs/registry-ci.md](https://github.com/${{ github.repository }}/blob/main/docs/registry-ci.md)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
