  <meta property="og:title" content="日本不動産インテリジェンス">
  <meta property="og:description" content="地価・取引価格・路線価・災害リスク・人口・人流データを融合分析。10都道府県29ツール対応。">

  <!-- CSS_PLACEHOLDER -->
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>日本不動産インテリジェンス</h1>
      <span class="subtitle">地価・取引・災害リスク クロス分析ダッシュボード</span>
    </header>
    <div id="main">
      <div id="mobile-backdrop"></div>
      <aside id="search-panel"></aside>
      <div id="map-wrapper">
        <button id="mobile-filter-toggle" class="mobile-toggle-btn">🔍 フィルター</button>
        <button id="mobile-insight-toggle" class="mobile-toggle-btn">📊 インサイト</button>
        <div id="map-container"></div>
      </div>
      <aside id="insight-panel"></aside>
    </div>
  </div>
  <!-- JS_PLACEHOLDER -->
<script>
/* ── フェードイン遷移 — overlay .visible 付与時にコンテンツに rei-reveal を適用 ── */
(function reiReveal() {
  var OVERLAY_CONTENT_MAP = {
    'report-overlay': 'report-content',
    'opportunity-overlay': 'opportunity-content',
  };
  function applyReveal(overlayId) {
    var contentId = OVERLAY_CONTENT_MAP[overlayId];
    if (!contentId) return;
    var el = document.getElementById(contentId);
    if (!el) return;
    el.classList.remove('rei-reveal');
    void el.offsetWidth;
    el.classList.add('rei-reveal');
  }
  function patchInsightPanel() {
    var ip = document.getElementById('insight-panel');
    if (!ip || ip._reiRevealPatched) return;
    ip._reiRevealPatched = true;
    var mo = new MutationObserver(function (mutations) {
      var hasAddedNodes = mutations.some(function (m) { return m.addedNodes.length > 0; });
      if (!hasAddedNodes) return;
      ip.classList.remove('rei-reveal');
      void ip.offsetWidth;
      ip.classList.add('rei-reveal');
    });
    mo.observe(ip, { childList: true, subtree: false });
  }
  var overlayObs = new MutationObserver(function (mutations) {
    mutations.forEach(function (m) {
      if (m.type !== 'attributes' || m.attributeName !== 'class') return;
      var el = m.target;
      if (el.classList && el.classList.contains('visible')) {
        applyReveal(el.id);
      }
    });
  });
  function init() {
    Object.keys(OVERLAY_CONTENT_MAP).forEach(function (id) {
      var el = document.getElementById(id);
      if (el) overlayObs.observe(el, { attributes: true });
    });
    patchInsightPanel();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
