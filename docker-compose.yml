services:
  # ── Japan Real Estate Intel MCP Server ───────────────────────────────────
  mcp:
    build: .
    image: japan-re-intel-mcp:latest
    container_name: rei-mcp
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: "3100"
      HOST: "0.0.0.0"
      NODE_ENV: production
      # Keep generated report/CSV/Excel artifact files inside the rei_sqlite
      # volume, alongside artifacts.sqlite (whose default path, /app/db/artifacts.sqlite,
      # is already inside that volume). Without this, ARTIFACT_DIR defaults to
      # /app/artifacts — not mounted — so a container recreation would leave
      # artifacts.sqlite pointing at files that no longer exist (getArtifact()
      # degrades to a 404 rather than erroring, but outstanding resource_links
      # would break before their TTL expires).
      ARTIFACT_DIR: /app/db/artifacts
    expose:
      - "3100"
    volumes:
      - rei_data:/app/data
      - rei_sqlite:/app/db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - rei_net

  # ── Caddy: automatic HTTPS reverse proxy (Option A) ─────────────────────
  # Use when deploying to a VPS with a public IP + domain.
  caddy:
    image: caddy:2-alpine
    container_name: rei-caddy
    restart: unless-stopped
    profiles: ["caddy"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      mcp:
        condition: service_healthy
    networks:
      - rei_net

  # ── CloudFlare Tunnel (Option B) ────────────────────────────────────────
  # Use when deploying behind NAT / no public IP / no domain yet.
  # Set TUNNEL_TOKEN in .env.production (from `cloudflared tunnel create`).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rei-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      mcp:
        condition: service_healthy
    networks:
      - rei_net

volumes:
  rei_data:
  rei_sqlite:
  caddy_data:
  caddy_config:

networks:
  rei_net:
    driver: bridge
