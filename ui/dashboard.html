(function reiReveal() {
  var OVERLAY_CONTENT_MAP = {
    'report-overlay': 'report-content',
    'opportunity-overlay': 'opportunity-content',
  };
  function applyReveal(overlayId) {
    var contentId = OVERLAY_CONTENT_MAP[overlayId];
    if (!contentId) return;
    var el = document.getElementById(contentId);
    if (!el) return;
    el.classList.remove('rei-reveal');
    void el.offsetWidth;
    el.classList.add('rei-reveal');
  }
  function patchInsightPanel() {
    var ip = document.getElementById('insight-panel');
    if (!ip || ip._reiRevealPatched) return;
    ip._reiRevealPatched = true;
    var mo = new MutationObserver(function (mutations) {
      var hasAddedNodes = mutations.some(function (m) { return m.addedNodes.length > 0; });
      if (!hasAddedNodes) return;
      ip.classList.remove('rei-reveal');
      void ip.offsetWidth;
      ip.classList.add('rei-reveal');
    });

  }
  var overlayObs = new MutationObserver(function (mutations) {
    mutations.forEach(function (m) {
      if (m.type !== 'attributes' || m.attributeName !== 'class') return;

      }
    });
  });
  function init() {
    Object.keys(OVERLAY_CONTENT_MAP).forEach(function (id) {
      var el = document.getElementById(id);
      if (el) overlayObs.observe(el, { attributes: true });

  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
